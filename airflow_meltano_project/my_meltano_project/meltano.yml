version: 1
default_environment: dev
project_id: 1eb1af64-471e-4475-86ac-7b045648565c
environments:
- name: dev
- name: staging
- name: prod
plugins:
  extractors:
  - name: tap-csv
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-csv.git
    config:
      files:
      - entity: your_entity
        path: ~data/order_details.csv
      delimiter: ','
      quotechar: '"'
  loaders:
  - name: target-postgres
    variant: meltanolabs
    pip_url: meltanolabs-target-postgres
    config:
      host: localhost
      port: 5432
      dbname: northwind
      user: northwind_user
